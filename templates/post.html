{% extends "base.html" %}

{% block title %}{{ site.name }} | {{ post.title }}{% endblock %}

{% block content %}
<article class="page-intro">
  <div class="container narrow article-body">
    <p class="eyebrow">{{ post.read_time }}</p>
    <h1>{{ post.title }}</h1>
    <p class="lead">{{ post.intro }}</p>
    <div class="markdown-body">{{ post.content_html | safe }}</div>
  </div>
</article>
{% endblock %}
